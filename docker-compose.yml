version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: finansys_user
      POSTGRES_PASSWORD: finansys_password
      POSTGRES_DB: finansys_db
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    networks:
      - app_network

  redis:
    image: redis:7-alpine
    restart: always
    networks:
      - app_network

  finansys:
    build: .
    restart: always
    ports:
      - "3006:3000"
    environment:
      - PORT=3000
      - DB_DIALECT=postgres
      - DB_NAME=finansys_db
      - DB_USER=finansys_user
      - DB_PASS=finansys_password
      - DB_HOST=db
      - JWT_SECRET=super_secret_finansys_key_change_me
      - RESEND_API_KEY=${RESEND_API_KEY}
      - RESEND_FROM=${RESEND_FROM:-onboarding@resend.dev}
      - APP_URL=https://app.cerasus.com.br
      - BOT_API_KEY=${BOT_API_KEY:-n8n_secret_bot_key_123}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - PLUGGY_CLIENT_ID=${PLUGGY_CLIENT_ID}
      - PLUGGY_CLIENT_SECRET=${PLUGGY_CLIENT_SECRET}
    depends_on:
      - db
    networks:
      - app_network
      - tunnel_net

  n8n:
    image: docker.n8n.io/n8nio/n8n
    restart: always
    user: "root"
    ports:
      - "3008:5678"
    environment:
      - N8N_HOST=n8n.cerasus.com.br
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=https://n8n.cerasus.com.br/
      - GENERIC_TIMEZONE=America/Sao_Paulo
      - N8N_SSH_LEGACY_CIPHERS=true
    volumes:
      - n8n_data:/root/.n8n
    networks:
      - tunnel_net

  evolution:
    image: evoapicloud/evolution-api:latest
    restart: always
    ports:
      - "3009:8080"
    environment:
      - SERVER_URL=https://api.cerasus.com.br
      - "CORS_ORIGIN=*"
      - CORS_METHODS=GET,POST,PUT,DELETE,PATCH
      - CORS_CREDENTIALS=true
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://finansys_user:finansys_password@db:5432/evolution_db
      - DATABASE_CONNECTION_CLIENT_NAME=evolution_api
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://redis:6379
      - CACHE_REDIS_PREFIX_KEY=evolution
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=B39CA8B62C05DA3CD778A9C1DE4DAB37
    volumes:
      - evolution_data:/evolution/store
    depends_on:
      - db
      - redis
    networks:
      - tunnel_net
      - app_network

  cerasus-web:
    image: nginx:alpine
    restart: always
    volumes:
      - ./public_html:/usr/share/nginx/html:ro
    networks:
      - tunnel_net

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: always
    command: tunnel --no-autoupdate run --protocol http2
    environment:
      - TUNNEL_TOKEN=eyJhIjoiYmMxMzMwZjI1MGZkNmE3OTUwODlhN2RmM2I4ZmFhZjkiLCJ0IjoiODk1OTU1OTItZWE0MS00YTUxLWFhY2EtMjA2OTdiZTY4NzA2IiwicyI6IlpEVXlNREZsTTJJdFlqUTRPQzAwTldaakxUazBPR1V0TVRka04ySXhNVGhtT1RJNSJ9
    networks:
      - tunnel_net

networks:
  app_network:
    driver: bridge
  tunnel_net:
    driver: bridge

volumes:
  n8n_data:
  evolution_data:
