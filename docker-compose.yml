version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: finansys_user
      POSTGRES_PASSWORD: finansys_password
      POSTGRES_DB: finansys_db
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    networks:
      - app_network

  finansys:
    build: .
    restart: always
    ports:
      - "3006:3000"
    environment:
      - PORT=3000
      - DB_DIALECT=postgres
      - DB_NAME=finansys_db
      - DB_USER=finansys_user
      - DB_PASS=finansys_password
      - DB_HOST=db
      - JWT_SECRET=super_secret_finansys_key_change_me
    depends_on:
      - db
    networks:
      - app_network
      - tunnel_net

  n8n:
    image: docker.n8n.io/n8nio/n8n
    restart: always
    ports:
      - "3008:5678"
    environment:
      - N8N_HOST=n8n.dksystem.online
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - NODE_ENV=production
      - WEBHOOK_URL=https://n8n.dksystem.online/
      - GENERIC_TIMEZONE=America/Sao_Paulo
    volumes:
      - ./n8n_data:/home/node/.n8n
    networks:
      - tunnel_net

  evolution:
    image: evoapicloud/evolution-api:latest
    restart: always
    ports:
      - "3009:8080"
    environment:
      - SERVER_URL=https://evolution.dksystem.online
      - "CORS_ORIGIN=*"
      - CORS_METHODS=GET,POST,PUT,DELETE,PATCH
      - CORS_CREDENTIALS=true
      - DBASE_URL=sqlite://./db.sqlite
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=B39CA8B62C05DA3CD778A9C1DE4DAB37
    volumes:
      - ./evolution_instances:/evolution/instances
      - ./evolution_store:/evolution/store
    networks:
      - tunnel_net

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: always
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - tunnel_net

networks:
  app_network:
    driver: bridge
  tunnel_net:
    driver: bridge
