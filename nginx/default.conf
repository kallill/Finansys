server {
    listen       80;
    server_name  localhost;

    # Força o charset UTF-8 via header HTTP para todos os arquivos HTML/CSS/JS
    charset utf-8;

    root   /usr/share/nginx/html;
    index  index.html index.htm;

    # DNS interno do Docker
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $backend http://finansys:3000;

    # Proxy /api/* -> Backend Node.js
    location /api/ {
        proxy_pass        $backend;
        proxy_http_version 1.1;
        proxy_set_header  Upgrade $http_upgrade;
        proxy_set_header  Connection 'upgrade';
        proxy_set_header  Host $host;
        proxy_set_header  X-Real-IP $remote_addr;
        proxy_set_header  X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }

    # Proxy /admin/* -> React App (CRM Admin)
    location /admin {
        proxy_pass        $backend;
        proxy_http_version 1.1;
        proxy_set_header  Upgrade $http_upgrade;
        proxy_set_header  Connection 'upgrade';
        proxy_set_header  Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Inteligência de Ativos (CSS/JS): 
    # Tenta carregar da Landing Page local primeiro. Se não achar, busca no Backend (CRM).
    location /assets {
        try_files $uri @backend_assets;
    }

    location @backend_assets {
        proxy_pass        $backend;
        proxy_http_version 1.1;
        proxy_set_header  Host $host;
    }

    # Landing page estática da Cerasus
    location / {
        try_files $uri $uri/ /index.html;
    }
}
