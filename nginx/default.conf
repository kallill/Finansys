server {
    listen       80;
    server_name  localhost;

    root   /usr/share/nginx/html;
    index  index.html index.htm;

    # Redireciona TODAS as rotas do CRM Admin para o container finansys (React App)
    location /admin {
        proxy_pass http://finansys:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Redireciona os assets do React (/assets/) para o finansys também
    location /assets {
        proxy_pass http://finansys:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Serve a landing page estática da Cerasus normalmente
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache dos arquivos estáticos da landing page
    location ~* \.(ico|png|jpg|jpeg|gif|svg|woff|woff2|ttf|css|js)$ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
        try_files $uri $uri/ =404;
    }
}
