server {
    listen       80;
    server_name  localhost;

    root   /usr/share/nginx/html;
    index  index.html index.htm;

    # Proxy /api/* para o backend Node.js (CRM Auth + APIs do Finansys)
    location /api/ {
        proxy_pass http://172.18.0.4:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }

    # Proxy /admin/* para o React App (CRM Admin)
    location /admin {
        proxy_pass http://172.18.0.4:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Assets do React (JS/CSS do CRM via cerasus.com.br)
    location /assets {
        proxy_pass http://172.18.0.4:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Landing page estatica da Cerasus
    location / {
        try_files $uri $uri/ /index.html;
    }
}
