server {
    listen       80;
    server_name  localhost;

    # Força o charset UTF-8 via header HTTP para todos os arquivos HTML/CSS/JS
    charset utf-8;

    root   /usr/share/nginx/html;
    index  index.html index.htm;

    # Usar o DNS interno do Docker para resolver nomes de containers dinamicamente.
    # Assim, mesmo que o container 'finansys' reinicie e mude de IP, o nginx
    # vai resolver o novo IP automaticamente. Nunca mais IP hardcoded!
    resolver 127.0.0.11 valid=10s ipv6=off;

    set $backend http://finansys:3000;

    # Proxy /api/* -> Backend Node.js (CRM Auth + APIs)
    location /api/ {
        proxy_pass        $backend;
        proxy_http_version 1.1;
        proxy_set_header  Upgrade $http_upgrade;
        proxy_set_header  Connection 'upgrade';
        proxy_set_header  Host $host;
        proxy_set_header  X-Real-IP $remote_addr;
        proxy_set_header  X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }

    # Proxy /admin/* -> React App (CRM Admin)
    location /admin {
        proxy_pass        $backend;
        proxy_http_version 1.1;
        proxy_set_header  Upgrade $http_upgrade;
        proxy_set_header  Connection 'upgrade';
        proxy_set_header  Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Assets do React (JS/CSS) vindos do CRM
    location /assets {
        proxy_pass        $backend;
        proxy_http_version 1.1;
        proxy_set_header  Host $host;
    }

    # Landing page estatica da Cerasus - serve normalmente
    location / {
        try_files $uri $uri/ /index.html;
    }
}
